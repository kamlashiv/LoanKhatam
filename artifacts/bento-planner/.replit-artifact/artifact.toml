kind = "web"
previewPath = "/bento-planner/"
title = "Smart Loan Saver"
version = "1.0.0"
id = "artifacts/bento-planner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/bento-planner/" ]
localPort = 20589

[services.development]
run = "pnpm --filter @workspace/bento-planner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bento-planner", "run", "build" ]
publicDir = "artifacts/bento-planner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20589"
BASE_PATH = "/bento-planner/"
