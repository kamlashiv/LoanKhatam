openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Loan Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: loans
    description: Loan management
  - name: payments
    description: Payment tracking
  - name: dashboard
    description: Dashboard summaries
  - name: profile
    description: Global financial profile
  - name: settings
    description: User account preferences
  - name: feedback
    description: User feedback and feature requests
  - name: groups
    description: Group expense splitting

paths:
  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get the current user's global financial profile
      responses:
        "200":
          description: Financial profile (defaults when none saved yet)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialProfile"
        "401":
          description: Unauthorized
    put:
      operationId: updateProfile
      tags: [profile]
      summary: Create or replace the current user's global financial profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinancialProfileData"
      responses:
        "200":
          description: Saved financial profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialProfile"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get the current user's account preferences
      responses:
        "200":
          description: User settings (defaults when none saved yet)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
        "401":
          description: Unauthorized
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Create or replace the current user's account preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettingsData"
      responses:
        "200":
          description: Saved settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized

  /feedback:
    post:
      operationId: submitFeedback
      tags: [feedback]
      summary: Submit user feedback, a rating, or a feature request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackInput"
      responses:
        "201":
          description: Feedback recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feedback"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /loans:
    get:
      operationId: listLoans
      tags: [loans]
      summary: List all loans for current user
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, paid, overdue]
          required: false
      responses:
        "200":
          description: List of loans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Loan"
        "401":
          description: Unauthorized
    post:
      operationId: createLoan
      tags: [loans]
      summary: Create a new loan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoanInput"
      responses:
        "201":
          description: Loan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized

  /loans/{id}:
    get:
      operationId: getLoan
      tags: [loans]
      summary: Get a loan by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Loan details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"
        "404":
          description: Not found
        "401":
          description: Unauthorized
    patch:
      operationId: updateLoan
      tags: [loans]
      summary: Update a loan
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoanUpdate"
      responses:
        "200":
          description: Updated loan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"
        "404":
          description: Not found
        "401":
          description: Unauthorized
    delete:
      operationId: deleteLoan
      tags: [loans]
      summary: Delete a loan
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
        "401":
          description: Unauthorized

  /loans/{id}/payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List payments for a loan
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
        "401":
          description: Unauthorized
    post:
      operationId: addPayment
      tags: [payments]
      summary: Add a payment to a loan
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Payment added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized

  /loans/{id}/payments/{paymentId}:
    delete:
      operationId: deletePayment
      tags: [payments]
      summary: Delete a payment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: paymentId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
        "401":
          description: Unauthorized

  /credit-cards:
    get:
      operationId: listCreditCards
      tags: [credit-cards]
      summary: List all credit cards for current user
      responses:
        "200":
          description: List of credit cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CreditCard"
        "401":
          description: Unauthorized
    post:
      operationId: createCreditCard
      tags: [credit-cards]
      summary: Create a new credit card
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditCardInput"
      responses:
        "201":
          description: Credit card created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditCard"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized

  /credit-cards/{id}:
    get:
      operationId: getCreditCard
      tags: [credit-cards]
      summary: Get a credit card by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Credit card details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditCard"
        "404":
          description: Not found
        "401":
          description: Unauthorized
    patch:
      operationId: updateCreditCard
      tags: [credit-cards]
      summary: Update a credit card
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditCardUpdate"
      responses:
        "200":
          description: Updated credit card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditCard"
        "404":
          description: Not found
        "401":
          description: Unauthorized
    delete:
      operationId: deleteCreditCard
      tags: [credit-cards]
      summary: Delete a credit card
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
        "401":
          description: Unauthorized

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          description: Unauthorized

  /loans/recent:
    get:
      operationId: getRecentLoans
      tags: [loans]
      summary: Get recent loans (last 5)
      responses:
        "200":
          description: Recent loans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Loan"
        "401":
          description: Unauthorized

  /groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List all groups for the current user
      responses:
        "200":
          description: List of groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Group"
        "401":
          description: Unauthorized
    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a new group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupInput"
      responses:
        "201":
          description: Group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized

  /groups/{id}:
    delete:
      operationId: deleteGroup
      tags: [groups]
      summary: Delete a group by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Group deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "404":
          description: Group not found
        "401":
          description: Unauthorized

  /groups/{id}/expenses:
    get:
      operationId: listGroupExpenses
      tags: [groups]
      summary: List all expenses for a group
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of group expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupExpense"
        "401":
          description: Unauthorized
    post:
      operationId: createGroupExpense
      tags: [groups]
      summary: Add a new expense to a group
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupExpenseInput"
      responses:
        "201":
          description: Group expense added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupExpense"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized

  /groups/{id}/expenses/{expenseId}:
    delete:
      operationId: deleteGroupExpense
      tags: [groups]
      summary: Delete a group expense by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: expenseId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Group expense deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "404":
          description: Expense not found
        "401":
          description: Unauthorized

  /extract-financials:
    post:
      operationId: extractFinancials
      tags: [sync]
      summary: Detect credit cards and loans from pasted statement or email text using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractFinancialsInput"
      responses:
        "200":
          description: Detected financial items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialScanResult"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized

  /gmail/status:
    get:
      operationId: getGmailStatus
      tags: [sync]
      summary: Whether a Gmail account is connected for auto-sync
      responses:
        "200":
          description: Gmail connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GmailStatus"
        "401":
          description: Unauthorized

  /gmail/scan:
    post:
      operationId: scanGmail
      tags: [sync]
      summary: Scan the connected Gmail inbox and detect cards and loans via AI
      responses:
        "200":
          description: Detected financial items from email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialScanResult"
        "401":
          description: Unauthorized
        "503":
          description: Gmail not connected

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RateChange:
      type: object
      required:
        - effectiveDate
        - newRate
      properties:
        effectiveDate:
          type: string
        newRate:
          type: number
          minimum: 0

    Loan:
      type: object
      required:
        - id
        - userId
        - borrowerName
        - principalAmount
        - interestRate
        - startDate
        - dueDate
        - status
        - totalPaid
        - remainingAmount
        - createdAt
        - rateChanges
        - interestType
      properties:
        id:
          type: integer
        userId:
          type: string
        borrowerName:
          type: string
        principalAmount:
          type: number
        interestRate:
          type: number
        tenureMonths:
          type: ["integer", "null"]
        startDate:
          type: string
        dueDate:
          type: string
        bank:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, paid, overdue]
        totalPaid:
          type: number
        remainingAmount:
          type: number
        createdAt:
          type: string
        interestType:
          type: string
          default: standard_emi
        rateChanges:
          type: array
          items:
            $ref: "#/components/schemas/RateChange"

    LoanInput:
      type: object
      required:
        - borrowerName
        - principalAmount
        - interestRate
      properties:
        borrowerName:
          type: string
          minLength: 1
        principalAmount:
          type: number
          minimum: 0
        interestRate:
          type: number
          minimum: 0
        interestType:
          type: string
          default: standard_emi
        tenureMonths:
          type: integer
          minimum: 1
        startDate:
          type: string
        dueDate:
          type: string
        bank:
          type: string
        description:
          type: string
        rateChanges:
          type: array
          items:
            $ref: "#/components/schemas/RateChange"

    LoanUpdate:
      type: object
      properties:
        borrowerName:
          type: string
        principalAmount:
          type: number
        interestRate:
          type: number
        interestType:
          type: string
          default: standard_emi
        tenureMonths:
          type: integer
          minimum: 1
        startDate:
          type: string
        dueDate:
          type: string
        bank:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, paid, overdue]
        rateChanges:
          type: array
          items:
            $ref: "#/components/schemas/RateChange"

    CreditCard:
      type: object
      required:
        - id
        - userId
        - bank
        - cardName
        - last4
        - network
        - creditLimit
        - outstanding
        - createdAt
      properties:
        id:
          type: integer
        userId:
          type: string
        bank:
          type: string
        cardName:
          type: string
        last4:
          type: string
        network:
          type: string
        creditLimit:
          type: number
        outstanding:
          type: number
        dueDate:
          type: ["string", "null"]
        createdAt:
          type: string

    CreditCardInput:
      type: object
      required:
        - bank
        - cardName
        - last4
        - network
        - creditLimit
      properties:
        bank:
          type: string
          minLength: 1
        cardName:
          type: string
          minLength: 1
        last4:
          type: string
          minLength: 4
          maxLength: 4
        network:
          type: string
          minLength: 1
        creditLimit:
          type: number
          minimum: 0
        outstanding:
          type: number
          minimum: 0
        dueDate:
          type: string

    CreditCardUpdate:
      type: object
      properties:
        bank:
          type: string
          minLength: 1
        cardName:
          type: string
          minLength: 1
        last4:
          type: string
          minLength: 4
          maxLength: 4
        network:
          type: string
          minLength: 1
        creditLimit:
          type: number
          minimum: 0
        outstanding:
          type: number
          minimum: 0
        dueDate:
          type: string

    ExtractFinancialsInput:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          description: Pasted statement, email, or message text to analyse

    DetectedCard:
      type: object
      required:
        - bank
        - cardName
        - last4
        - network
        - confidence
        - source
      properties:
        bank:
          type: string
        cardName:
          type: string
        last4:
          type: string
        network:
          type: string
        creditLimit:
          type: ["number", "null"]
        outstanding:
          type: ["number", "null"]
        dueDate:
          type: ["string", "null"]
        confidence:
          type: string
          enum: [high, medium, low]
        source:
          type: string
          description: Where the item was detected (e.g. Gmail, Pasted)

    DetectedLoan:
      type: object
      required:
        - lender
        - confidence
        - source
      properties:
        lender:
          type: string
        loanType:
          type: ["string", "null"]
        principalAmount:
          type: ["number", "null"]
        interestRate:
          type: ["number", "null"]
        emi:
          type: ["number", "null"]
        startDate:
          type: ["string", "null"]
        dueDate:
          type: ["string", "null"]
        confidence:
          type: string
          enum: [high, medium, low]
        source:
          type: string

    FinancialScanResult:
      type: object
      required:
        - cards
        - loans
      properties:
        cards:
          type: array
          items:
            $ref: "#/components/schemas/DetectedCard"
        loans:
          type: array
          items:
            $ref: "#/components/schemas/DetectedLoan"
        emailsScanned:
          type: integer
          description: Number of emails scanned (Gmail scan only)

    GmailStatus:
      type: object
      required:
        - connected
      properties:
        connected:
          type: boolean
        email:
          type: ["string", "null"]

    Payment:
      type: object
      required:
        - id
        - loanId
        - amount
        - paymentDate
        - createdAt
      properties:
        id:
          type: integer
        loanId:
          type: integer
        amount:
          type: number
        paymentDate:
          type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    PaymentInput:
      type: object
      required:
        - amount
        - paymentDate
      properties:
        amount:
          type: number
          minimum: 0
        paymentDate:
          type: string
        notes:
          type: string

    ProfileDebtItem:
      type: object
      required:
        - id
        - name
        - balance
        - rate
        - minPayment
      properties:
        id:
          type: string
        name:
          type: string
        balance:
          type: number
        rate:
          type: number
        minPayment:
          type: number

    FinancialProfileData:
      type: object
      required:
        - name
        - age
        - occupation
        - monthlyIncome
        - additionalIncome
        - rent
        - emi
        - insurance
        - utilities
        - schoolFees
        - internet
        - otherFixed
        - food
        - fuel
        - travel
        - entertainment
        - shopping
        - medical
        - miscellaneous
        - currentSavings
        - existingInvestments
        - creditCardDebt
        - debts
        - goals
        - riskProfile
      properties:
        name:
          type: string
        age:
          type: number
        occupation:
          type: string
        monthlyIncome:
          type: number
        additionalIncome:
          type: number
        rent:
          type: number
        emi:
          type: number
        insurance:
          type: number
        utilities:
          type: number
        schoolFees:
          type: number
        internet:
          type: number
        otherFixed:
          type: number
        food:
          type: number
        fuel:
          type: number
        travel:
          type: number
        entertainment:
          type: number
        shopping:
          type: number
        medical:
          type: number
        miscellaneous:
          type: number
        currentSavings:
          type: number
        existingInvestments:
          type: number
        creditCardDebt:
          type: number
        debts:
          type: array
          items:
            $ref: "#/components/schemas/ProfileDebtItem"
        goals:
          type: array
          items:
            type: string
        riskProfile:
          type: string
          enum: [conservative, moderate, aggressive]

    FinancialProfile:
      type: object
      required:
        - data
        - updatedAt
      properties:
        data:
          $ref: "#/components/schemas/FinancialProfileData"
        updatedAt:
          type: ["string", "null"]

    UserNotificationPrefs:
      type: object
      required:
        - emiReminder
        - dueDateReminder
        - prepaymentReminder
        - weeklySummary
        - monthlySummary
        - emailNotifications
        - pushNotifications
        - whatsappNotifications
      properties:
        emiReminder:
          type: boolean
        dueDateReminder:
          type: boolean
        prepaymentReminder:
          type: boolean
        weeklySummary:
          type: boolean
        monthlySummary:
          type: boolean
        emailNotifications:
          type: boolean
        pushNotifications:
          type: boolean
        whatsappNotifications:
          type: boolean
        whatsappNumber:
          type: ["string", "null"]
          description: WhatsApp number (with country code) for WhatsApp reminders

    UserSocialAccounts:
      type: object
      description: User-provided handles or profile links for social/messaging platforms.
      properties:
        whatsapp:
          type: ["string", "null"]
          description: WhatsApp number (with country code) or wa.me link
        facebook:
          type: ["string", "null"]
        instagram:
          type: ["string", "null"]
        twitter:
          type: ["string", "null"]
          description: X (Twitter) handle or profile URL
        linkedin:
          type: ["string", "null"]
        telegram:
          type: ["string", "null"]
        youtube:
          type: ["string", "null"]

    UserSettingsData:
      type: object
      required:
        - currency
        - locale
        - dateFormat
        - defaultInterestRate
        - defaultTenureMonths
        - autoSaveCalculations
        - notifications
      properties:
        currency:
          type: string
          description: ISO 4217 currency code, e.g. INR, USD
        locale:
          type: string
          description: BCP-47 locale for number formatting, e.g. en-IN
        dateFormat:
          type: string
          enum: [DD/MM/YYYY, MM/DD/YYYY, YYYY-MM-DD]
        defaultInterestRate:
          type: number
        defaultTenureMonths:
          type: number
        autoSaveCalculations:
          type: boolean
